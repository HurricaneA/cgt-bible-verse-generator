<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tamil Bible Verse Generator</title>
    <meta
      name="description"
      content="Turn a Tamil scripture reference into ready-to-project images: full 16:9 slides and transparent lower-third overlays."
    />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%23273e94'/%3E%3Ctext x='16' y='23' font-family='Noto Sans Tamil,sans-serif' font-size='21' fill='white' text-anchor='middle'%3E%E0%AE%A4%3C/text%3E%3C/svg%3E"
    />

    <!-- Resolve the theme before first paint so there is no light-mode flash. -->
    <script>
      ;(function () {
        try {
          var s = localStorage.getItem('tamil-bible-color-scheme') || 'system'
          var dark =
            s === 'dark' ||
            (s === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches)
          document.documentElement.dataset.theme = dark ? 'dark' : 'light'
        } catch (e) {
          document.documentElement.dataset.theme = 'light'
        }
      })()
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Source Sans 3: the whole UI — humanist, warm, built for interface sizes.
         Noto Sans Tamil: Unicode Tamil in the converter and the brand mark.
         The rendered PNGs use Tharmini (self-hosted) and Arial (system). -->
    <link
      href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@300..700&family=Noto+Sans+Tamil:wght@400;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
